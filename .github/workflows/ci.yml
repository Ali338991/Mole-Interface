name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build (macOS)
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build
        run: >
          xcodebuild build
          -project Nebula.xcodeproj
          -scheme Nebula
          -destination 'platform=macOS'
          CODE_SIGNING_ALLOWED=NO
          CODE_SIGN_IDENTITY=""
